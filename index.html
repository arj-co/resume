<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arjun Shewalkar</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --text: #d1d1d1;
      --muted: #888;
      --link: #c8c8c8;
      --link-hover: #fff;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.75;
      min-height: 100vh;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 140px 32px 120px;
    }

    .avatar {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 32px;
      color: #fff;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    p {
      color: var(--text);
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
    }

    p:nth-of-type(1) { animation-delay: 0.2s; }
    p:nth-of-type(2) { animation-delay: 0.3s; }
    p:nth-of-type(3) { animation-delay: 0.4s; }
    p:nth-of-type(4) { animation-delay: 0.5s; }
    p:nth-of-type(5) { animation-delay: 0.6s; }

    p.muted {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .social-links {
      display: flex;
      gap: 20px;
      margin-top: 40px;
      animation: fadeUp 0.6s 0.7s ease both;
    }

    .social-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .social-links a:hover {
      color: #fff;
    }

    .social-links a svg {
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .social-links a:hover svg {
      opacity: 1;
    }

    a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-color: rgba(200, 200, 200, 0.4);
      text-underline-offset: 3px;
      transition: color 0.15s, text-decoration-color 0.15s;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration-color: rgba(255, 255, 255, 0.8);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main>
    <span class="avatar"></span>
    <h1>Hey,  I'm  Arjun</h1>

    <p class="muted">Currently studying CS at <a href="https://vit.edu/">VIT Pune</a>.</p>

    <p class="muted">
      Most of my time I'm learning how to program, and solve problems.
    </p>

    <p class="muted">
      I'm not working on any projects as of now.
    </p>

    <p class="muted">
      You can find me on <a href="https://linkedin.com/in/arjco">LinkedIn</a>
      or reach out directly via <a href="mailto:arjco@proton.me">Email</a>.
    </p>

</html>
